# Inertial Navigation Controller Parameters
# ============================================
# 惯性导航控制器参数配置文件
# 修改后需重新运行 run_inertial_nav.sh 或重新 colcon build

inertial_nav_controller:
  ros__parameters:

    # ========================================
    # 基础运动参数
    # ========================================
    max_linear_speed: 0.8         # m/s 最大前进速度
    max_reverse_speed: 0.3        # m/s 最大倒车速度
    max_angular_speed: 3.0        # rad/s 最大旋转速度
    max_acceleration: 0.5         # m/s² 最大加速度（平滑加减速）

    # ========================================
    # 导航容差
    # ========================================
    position_tolerance: 0.05      # m (5cm) 位置容差
    angle_tolerance: 0.1          # rad (~5.7°) 角度容差
    waypoint_timeout: 10.0        # s 单航点超时时间 (0=不超时)
    
    # 航点位置容差配置
    default_waypoint_tolerance: 0.1   # m (10cm) 默认航点位置容差（航点未指定时使用）
    min_waypoint_tolerance: 0.12      # m (12cm) 最小位置容差下限（不允许小于此值，防止极限环打转）

    # ========================================
    # Pure Pursuit 预瞄控制
    # ========================================
    lookahead_distance: 0.5       # m 默认预瞄距离（绕行模式下锁定值）
    min_lookahead_distance: 0.1   # m 最小预瞄距离（防止不稳定）
    min_turning_radius: 0.3       # m 最小转弯半径（曲率钳位，越小转弯越急）

    # ========================================
    # 动态预瞄（距离自适应）
    # 根据到目标航点的距离自动调整预瞄距离
    # 远处→大预瞄(平滑), 近处→小预瞄(精准)
    # ========================================
    dynamic_lookahead_max: 1.0    # m 远处最大预瞄（距目标 >= dist_far_threshold 时）
    dynamic_lookahead_min: 0.15    # m 近处最小预瞄（距目标 <= dist_near_threshold 时）
    dist_far_threshold: 1.0       # m 远距离阈值
    dist_near_threshold: 0.3      # m 近距离阈值
    lookahead_lpf_alpha: 0.15     # 低通滤波系数(0~1), 越小越平滑
                                  # 建议: 0.1~0.2 平滑优先, 0.3~0.5 响应优先

    # ========================================
    # 倒车控制
    # ========================================
    enable_reverse: true          # 启用倒车（目标在后方时）
    reverse_angle_threshold: 0.8  # rad (~28.6°) 倒车最大横向偏角
                                  # 越小越严格, 越大越激进

    # ========================================
    # PID 角速度控制器
    # ========================================
    angular_kp: 3.0               # 比例增益
    angular_ki: 0.0               # 积分增益
    angular_kd: 0.5               # 微分增益（增大可减少振荡）

    # ========================================
    # 渐进式姿态混合（接近航点时边行驶边调整朝向）
    # 阿克曼底盘不支持原地旋转，必须在运动中完成朝向调整
    # ========================================
    yaw_blend_start_distance: 1.0  # m - 距航点多远开始混合姿态控制
                                   # 越大=越早开始调整（适合大角度转弯）
                                   # 越小=越晚开始调整（适合直线+末端微调）
                                   # 建议: 0.8~1.5m（阿克曼底盘转弯半径）

    # ========================================
    # 控制循环
    # ========================================
    control_frequency: 50.0       # Hz 控制循环频率

    # ========================================
    # 避障绕行（YOLO检测触发）
    # 物理参数: 车30×20cm, 桶20×20cm高30cm, 图像640×480
    # ========================================
    # --- 触发阈值 ---
    avoid_area: 15000             # 像素面积，实际触发值 = (此值 - 4000)
    avoid_trigger_bottom: 230     # 桶底部 y 坐标阈值（桶底 y 越大越近）
    # --- 绕行几何 ---
    avoid_detour_lateral_offset: 0.35  # m 横向闪避距离
    avoid_detour_forward_step: 0.8     # m 每个绕行航点的前进步长
    # --- 冷却 ---
    avoid_detour_cooldown: 3.0    # s 两次绕行之间的最小间隔
    # --- 速度 ---
    avoid_linear_speed: 0.35      # m/s 绕行时速度

    # ========================================
    # 坐标围栏 (GEOFENCE - 最高优先级安全约束)
    # 车辆绝对不允许超出此范围，优先级高于一切
    # ========================================
    fence_enabled: true              # 是否启用围栏
    fence_x_min: -0.1              # m 围栏 X 最小值
    fence_x_max: 4.3               # m 围栏 X 最大值
    fence_y_min: -0.15             # m 围栏 Y 最小值
    fence_y_max: 4.3               # m 围栏 Y 最大值

    # ========================================
    # YOLO 视觉停车 (PARKING 模式)
    # 到达最后一个航点后自动触发
    # ========================================
    park_gain_far: 3.0             # 远距离对准比例增益 (偏差>50px)
    park_gain_near: 2.0            # 近距离对准比例增益 (偏差<50px)
    park_align_threshold: 2.0      # 对准完成角度阈值 (度)
    park_entry_speed: 0.8          # m/s 入库速度
    park_dist_multiplier: 1.05     # 入库距离系数 (>1.0 确保完全入库)

    # ========================================
    # 航点序列
    # ========================================
    # 格式: [x, y, yaw, yaw_tol, timeout, dist_tol, pause_duration] (每个航点7个值)
    # - yaw = -999.0 表示不指定目标朝向（自主决定）
    # - dist_tol: 欧氏距离到达容差（米），下限保护 0.1m
    # - pause_duration: 到达后暂停秒数（>0 触发接近减速，0=不暂停直接过）
    #
    # 备用路线（逆时针 / 顺时针）可通过取消注释切换
    # 注释掉当前启用行，取消目标路线即可

